# =============================================================================
# FILE: render.yaml — Render.com deployment blueprint
# DOES: Defines build + start for Profile Merge Lab web service.
# IN:   GitHub repo push.
# NEXT → uvicorn webapp.server:app → webapp/static/index.html
# =============================================================================
# Render Blueprint — https://render.com/docs/blueprint-spec
# Connect repo: New → Blueprint → select Eightfold-AI

services:
  - type: web
    name: profile-merge-lab
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn webapp.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
